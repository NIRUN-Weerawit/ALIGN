# ALIGN — Conda environment
# Create:  conda env create -f environment.yml
# Update:  conda env update -f environment.yml
# Activate: conda activate align
# Verify:  PYTHONNOUSERSITE=1 which python  # should be miniconda3/envs/align/bin/python
#          python scripts/check_deps.py
#
# Install sequence (verified on both local and helios machines):
#
#   # Step 1: PyTorch + torchcodec (all from same CUDA index)
#   pip install torch==2.10.0 torchvision==0.25.0 torchcodec==0.10.0 \
#       --index-url https://download.pytorch.org/whl/cu128
#
#   # Step 2: xformers (separately — avoids dependency conflicts with torchvision)
#   pip install xformers --index-url https://download.pytorch.org/whl/cu128
#
#   # Step 3: Everything else
#   pip install -r requirements.txt
#
# Other CUDA versions (cu118, cu121, cu124) also work — just match the index URL.
name: align
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.10
  # System deps (conda handles native libs: HDF5, BLAS)
  - numpy
  - scipy
  - h5py
  - pillow
  # Monitoring / utils
  - wandb
  - tqdm
  - requests
  # Pip-only packages
  - pip
  - pip:
    # PyTorch + CUDA — install via pip with CUDA index:
    #   pip install torch torchvision --index-url https://download.pytorch.org/whl/cu128
    - torch
    - torchvision
    # Core ML
    - open-clip-torch
    - lerobot
    - transformers
    # Video decoding — lerobot falls back to pyav if torchcodec unavailable
    - PyAV
    # Optional: Isaac Sim data collection and VR teleop
    # - isaacsim  # Follow NVIDIA's install guide
    # - paho-mqtt
    # - tensorflow-datasets