# ALIGN — Conda environment
# Create:  conda env create -f environment.yml
# Update:  conda env update -f environment.yml
# Activate: conda activate align
name: align
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.10
  # System deps (conda handles the native libs like HDF5 + BLAS)
  - numpy
  - scipy
  - h5py
  - pillow
  # Monitoring / utils
  - wandb
  - tqdm
  - requests
  # Pip-only packages (PyTorch via pip avoids channel conflicts)
  - pip
  - pip:
    # PyTorch + CUDA (latest, via pip for version parity)
    - torch
    - torchvision
    # Core ML
    - open-clip-torch
    - lerobot
    - torchcodec
    - xformers
    # Optional: Isaac Sim data collection and VR teleop
    # - isaacsim  # Follow NVIDIA's install guide
    # - paho-mqtt
    # - tensorflow-datasets