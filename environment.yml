# ALIGN — Conda environment
# Create:  conda env create -f environment.yml
# Update:  conda env update -f environment.yml
# Activate: conda activate align
# Verify:  PYTHONNOUSERSITE=1 which python  # should be miniconda3/envs/align/bin/python
#          python scripts/check_deps.py
name: align
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.10
  # System deps (conda handles native libs: HDF5, BLAS)
  - numpy
  - scipy
  - h5py
  - pillow
  # Monitoring / utils
  - wandb
  - tqdm
  - requests
  # Pip-only packages (PyTorch via pip avoids conda channel conflicts)
  - pip
  - pip:
    # PyTorch + CUDA — install via pip with CUDA index:
    #   pip install torch torchvision --index-url https://download.pytorch.org/whl/cu124
    - torch
    - torchvision
    # Core ML
    - open-clip-torch
    - lerobot
    - xformers
    - transformers
    # Video decoding — lerobot falls back to pyav if torchcodec unavailable
    - PyAV
    # Optional: Isaac Sim data collection and VR teleop
    # - isaacsim  # Follow NVIDIA's install guide
    # - paho-mqtt
    # - tensorflow-datasets